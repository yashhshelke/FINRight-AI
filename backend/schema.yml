openapi: 3.0.3
info:
  title: ''
  version: 0.0.0
paths:
  /api/ai/budget-advice/:
    get:
      operationId: api_ai_budget_advice_retrieve
      description: |-
        GET /api/ai/budget-advice/
        Returns AI-generated budget recommendations based on user's actual spending vs 50/30/20 rule.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/chat/:
    post:
      operationId: api_ai_chat_create
      description: |-
        POST /api/ai/chat/

        RAG-powered chat endpoint grounded in the user's uploaded documents.

        Request body:
            {
                "question": "How much did I spend on food last month?",
                "document_id": 5,          // optional — restrict to one document
                "session_id": null         // optional — continue an existing chat session
            }

        Response:
            {
                "answer": "...",
                "sources": [{"document_name": "...", "preview": "...", "relevance_score": 0.87}],
                "session_id": 12
            }
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/chat-sessions/:
    get:
      operationId: api_ai_chat_sessions_list
      description: |-
        GET /api/socket/chat-sessions/
        List user's chat sessions (paginated).
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedChatSessionList'
          description: ''
  /api/ai/chat-sessions/{session_id}/messages/:
    get:
      operationId: api_ai_chat_sessions_messages_list
      description: |-
        GET /api/ai/chat-sessions/<session_id>/messages/
        Cursor-paginated messages within a session (50 per page, newest-first).
        Use the returned `cursor` token in subsequent requests for infinite-scroll.
      parameters:
      - name: cursor
        required: false
        in: query
        description: The pagination cursor value.
        schema:
          type: string
      - in: path
        name: session_id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedChatMessageList'
          description: ''
  /api/ai/chat/history/:
    get:
      operationId: api_ai_chat_history_retrieve
      description: |-
        GET /api/ai/chat/history/
        Returns the message history for the user's global ChatSession.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/credit-analysis/:
    post:
      operationId: api_ai_credit_analysis_create
      description: |-
        POST /api/ai/credit-analysis/
        Body: { "loans": [...], "score": 750 }
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/daily-briefing/:
    get:
      operationId: api_ai_daily_briefing_retrieve
      description: GET /api/ai/daily-briefing/ -> returns the daily digest.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/document/process/:
    post:
      operationId: api_ai_document_process_create
      description: |-
        POST /api/ai/document/process/
        Cost: 5 Credits
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/documents/:
    get:
      operationId: api_ai_documents_retrieve
      description: GET /api/ai/documents/  -> list documents stored in SQL
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/documents/{document_id}/content/:
    get:
      operationId: api_ai_documents_content_retrieve
      description: GET /api/ai/documents/<document_id>/content/ -> return extracted
        raw text
      parameters:
      - in: path
        name: document_id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/expense-document/{doc_id}/summary/:
    get:
      operationId: api_ai_expense_document_summary_retrieve
      description: GET /api/ai/expense-document/<mongo_doc_id>/summary/
      parameters:
      - in: path
        name: doc_id
        schema:
          type: string
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/expense-document/{mongo_id}/suggestions/:
    get:
      operationId: api_ai_expense_document_suggestions_retrieve
      description: |-
        GET /api/ai/expense-document/<mongo_id>/suggestions/

        Generate actionable saving suggestions based on spending patterns.
      parameters:
      - in: path
        name: mongo_id
        schema:
          type: string
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/financial-health/breakdown/:
    get:
      operationId: api_ai_financial_health_breakdown_retrieve
      description: |-
        Get detailed breakdown of the current score
        Returns factor details with metrics and explanations
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/financial-health/history/:
    get:
      operationId: api_ai_financial_health_history_retrieve
      description: |-
        Get the user's financial health score history
        Returns scores for the last 12 months
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/financial-health/recalculate/:
    post:
      operationId: api_ai_financial_health_recalculate_create
      description: |-
        Force recalculation of the financial health score
        Optionally for a specific month
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/financial-health/recommendations/:
    get:
      operationId: api_ai_financial_health_recommendations_retrieve
      description: Get personalized recommendations based on the current score
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/financial-health/score/:
    get:
      operationId: api_ai_financial_health_score_retrieve
      description: |-
        Get the user's current financial health score
        Returns the most recent score or calculates a new one if none exists
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/goal-investment/:
    post:
      operationId: api_ai_goal_investment_create
      description: POST /api/ai/goal-investment/ -> deterministic SIP and goal roadmap
        planner.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/goal-plan/:
    get:
      operationId: api_ai_goal_plan_retrieve
      description: |-
        GET /api/ai/goal-plan/
        Returns AI-powered comprehensive goal planning analysis.
        Optional ?refresh=true to force re-analyze (costs 15 credits + throttled to 10/hour).
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/goal-plan/simulate/:
    post:
      operationId: api_ai_goal_plan_simulate_create
      description: |-
        POST /api/ai/goal-plan/simulate/
        Body: { "change_pct": -20 }
        Simulates income change impact on all goals.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/goal-planner/:
    get:
      operationId: api_ai_goal_planner_retrieve
      description: |-
        GET /api/ai/goal-plan/
        Returns AI-powered comprehensive goal planning analysis.
        Optional ?refresh=true to force re-analyze (costs 15 credits + throttled to 10/hour).
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/intelligence/:
    post:
      operationId: api_ai_intelligence_create
      description: POST /api/ai/intelligence/ — intent detection + tool routing +
        structured JSON output.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/knowledge/search/:
    get:
      operationId: api_ai_knowledge_search_retrieve
      description: GET /api/ai/knowledge/search/ -> verified educational knowledge
        search.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/loans/:
    get:
      operationId: api_ai_loans_list
      description: |-
        GET /api/ai/loans/ -> List user loans
        POST /api/ai/loans/ -> Create new loan
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedLoanList'
          description: ''
    post:
      operationId: api_ai_loans_create
      description: |-
        GET /api/ai/loans/ -> List user loans
        POST /api/ai/loans/ -> Create new loan
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Loan'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Loan'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Loan'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Loan'
          description: ''
  /api/ai/money-replay/:
    get:
      operationId: api_ai_money_replay_retrieve
      description: GET /api/ai/money-replay/ -> month-end story slides.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/ai/simulate/:
    post:
      operationId: api_ai_simulate_create
      description: |-
        POST /api/ai/simulate/
        Body: { "scenario": "loan", "amount": 50000 }
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimulationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SimulationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SimulationRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulationResponse'
          description: ''
  /api/ai/spending-analysis/:
    get:
      operationId: api_ai_spending_analysis_retrieve
      description: |-
        GET /api/ai/spending-analysis/

        Returns the latest AI spending analysis.
        If no recent analysis (last 24h) exists, it triggers a new one.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpendingAnalysisResponse'
          description: ''
  /api/ai/subscription-hunter/:
    get:
      operationId: api_ai_subscription_hunter_retrieve
      description: GET /api/ai/subscription-hunter/ -> detect recurring and inactive
        subscriptions.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionHunterResponse'
          description: ''
  /api/ai/tools/:
    post:
      operationId: api_ai_tools_create
      description: POST /api/ai/tools/ -> direct access to backend financial calculations.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinancialToolRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/FinancialToolRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FinancialToolRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialToolResponse'
          description: ''
  /api/gamification/badges/:
    get:
      operationId: api_gamification_badges_list
      description: GET /api/gamification/badges/ — all badge definitions.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBadgeList'
          description: ''
  /api/gamification/challenges/:
    get:
      operationId: api_gamification_challenges_list
      description: GET /api/gamification/challenges/ — all active global challenges.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedChallengeList'
          description: ''
  /api/gamification/my-badges/:
    get:
      operationId: api_gamification_my_badges_list
      description: |-
        GET /api/gamification/my-badges/
        Returns the user's earned badges.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserBadgeList'
          description: ''
  /api/gamification/my-challenges/:
    get:
      operationId: api_gamification_my_challenges_list
      description: |-
        GET /api/gamification/my-challenges/
        Returns the authenticated user's challenges.
        Auto-seeds any missing challenges so new users get all of them.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUserChallengeList'
          description: ''
  /api/gamification/my-challenges/{id}/toggle/:
    post:
      operationId: api_gamification_my_challenges_toggle_create
      description: |-
        POST /api/gamification/my-challenges/<id>/toggle/
        Toggle completion of a user challenge. Adjusts streak.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserChallenge'
          description: ''
  /api/gamification/summary/:
    get:
      operationId: api_gamification_summary_retrieve
      description: |-
        GET /api/gamification/summary/
        Combined overview: challenges stats, badges, streaks.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GamificationSummary'
          description: ''
  /api/goals/:
    get:
      operationId: api_goals_list
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedGoalList'
          description: ''
    post:
      operationId: api_goals_create
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Goal'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Goal'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Goal'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Goal'
          description: ''
  /api/goals/{id}/:
    get:
      operationId: api_goals_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Goal'
          description: ''
    put:
      operationId: api_goals_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Goal'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Goal'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Goal'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Goal'
          description: ''
    patch:
      operationId: api_goals_partial_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedGoal'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedGoal'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedGoal'
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Goal'
          description: ''
    delete:
      operationId: api_goals_destroy
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '204':
          description: No response body
  /api/reports/:
    get:
      operationId: api_reports_list
      description: |-
        GET /api/reports/ -> List user's financial reports.
        POST /api/reports/ -> Generate a new financial report.
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedFinancialReportList'
          description: ''
    post:
      operationId: api_reports_create
      description: |-
        GET /api/reports/ -> List user's financial reports.
        POST /api/reports/ -> Generate a new financial report.
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinancialReport'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/FinancialReport'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/FinancialReport'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinancialReport'
          description: ''
  /api/reports/money-replay/:
    get:
      operationId: api_reports_money_replay_retrieve
      description: GET /api/reports/money-replay/ -> generate the shareable month-end
        story.
      tags:
      - api
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MoneyReplayResponse'
          description: ''
  /api/schema/:
    get:
      operationId: api_schema_retrieve
      description: |-
        OpenApi3 schema for this API. Format can be selected via content negotiation.

        - YAML: application/vnd.oai.openapi
        - JSON: application/vnd.oai.openapi+json
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - yaml
      - in: query
        name: lang
        schema:
          type: string
