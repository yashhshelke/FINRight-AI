components:
  schemas:
    Badge:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        description:
          type: string
        icon:
          type: string
          maxLength: 50
        rarity:
          $ref: '#/components/schemas/RarityEnum'
        threshold_score:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
          description: Min health score to earn this badge
      required:
      - id
      - name
    BulkCreateResponse:
      type: object
      properties:
        message:
          type: string
      required:
      - message
    CategoryEnum:
      enum:
      - Tracking
      - Savings
      - Optimization
      - Planning
      - Investing
      type: string
      description: |-
        * `Tracking` - Tracking
        * `Savings` - Savings
        * `Optimization` - Optimization
        * `Planning` - Planning
        * `Investing` - Investing
    Challenge:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        description:
          type: string
        points:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        category:
          $ref: '#/components/schemas/CategoryEnum'
        icon:
          type: string
          maxLength: 50
        is_active:
          type: boolean
      required:
      - description
      - id
      - title
    ChangePassword:
      type: object
      description: Serializer for authenticated password change.
      properties:
        old_password:
          type: string
          writeOnly: true
        new_password:
          type: string
          writeOnly: true
        new_password_confirm:
          type: string
          writeOnly: true
      required:
      - new_password
      - new_password_confirm
      - old_password
    ChatMessage:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        session:
          type: integer
        sender:
          $ref: '#/components/schemas/SenderEnum'
        text:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - sender
      - session
      - text
    ChatSession:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        mongo_id:
          type: string
          nullable: true
          maxLength: 64
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
    CurrencyEnum:
      enum:
      - INR
      - USD
      - EUR
      - GBP
      type: string
      description: |-
        * `INR` - Indian Rupee
        * `USD` - US Dollar
        * `EUR` - Euro
        * `GBP` - British Pound
    EmailVerification:
      type: object
      description: |-
        Serializer for verifying email with token.

        Features:
        - Validates email verification token
        - Marks email as verified
      properties:
        token:
          type: string
      required:
      - token
    ExportDataResponse:
      type: object
      properties:
        profile:
          type: object
          additionalProperties: {}
        settings:
          type: object
          additionalProperties: {}
        transactions:
          type: array
          items: {}
        notifications:
          type: array
          items: {}
      required:
      - notifications
      - profile
      - settings
      - transactions
    FinancialReport:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 255
        report_type:
          $ref: '#/components/schemas/ReportTypeEnum'
        data:
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - data
      - id
      - title
    FinancialToolRequest:
      type: object
      properties:
        tool:
          type: string
        question:
          type: string
      required:
      - tool
    FinancialToolResponse:
      type: object
      properties:
        insight:
          type: string
        tool:
          type: string
        data:
          type: object
          additionalProperties: {}
      required:
      - data
      - insight
      - tool
    ForgotPassword:
      type: object
      description: |-
        Serializer for initiating password reset process.

        Features:
        - Email-based password reset
        - Generates reset token
        - Sends email with reset link
      properties:
        email:
          type: string
          format: email
      required:
      - email
    GamificationSummary:
      type: object
      properties:
        challenges:
          type: object
          additionalProperties: {}
        badges:
          type: object
          additionalProperties: {}
      required:
      - badges
      - challenges
    Goal:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
          maxLength: 200
        target_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        current_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        deadline:
          type: string
          format: date
          nullable: true
        priority:
          $ref: '#/components/schemas/PriorityEnum'
        monthly_contribution:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        icon:
          type: string
          maxLength: 10
        progress_percentage:
          type: number
          format: double
          readOnly: true
        status:
          type: string
          readOnly: true
        remaining_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        months_left:
          type: integer
          readOnly: true
        required_monthly:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        delay_months:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - delay_months
      - id
      - months_left
      - progress_percentage
      - remaining_amount
      - required_monthly
      - status
      - target_amount
    LanguageEnum:
      enum:
      - en
      - hi
      - ta
      type: string
      description: |-
        * `en` - English
        * `hi` - Hindi
        * `ta` - Tamil
    Loan:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          description: e.g. HDFC Home Loan
          maxLength: 255
        loan_type:
          type: string
          maxLength: 100
        principal_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        monthly_emi:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        interest_rate:
          type: number
          format: double
          nullable: true
        tenure_months:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        emis_paid:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        missed_emis:
          type: integer
          maximum: 9223372036854775807
          minimum: -9223372036854775808
          format: int64
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          readOnly: true
      required:
      - id
      - monthly_emi
      - name
      - principal_amount
      - status
      - tenure_months
    MarkAllReadRes:
      type: object
      properties:
        status:
          type: string
        marked:
          type: integer
      required:
      - marked
      - status
    MarkReadRes:
      type: object
      properties:
        status:
          type: string
      required:
      - status
    MoneyReplayResponse:
      type: object
