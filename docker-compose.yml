version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: finexa_postgres
    environment:
      POSTGRES_DB: finexa
      POSTGRES_USER: finexa_user
      POSTGRES_PASSWORD: finexa_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: finexa_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: finexa_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgres://finexa_user:finexa_password@db:5432/finexa
      - DB_SSL_REQUIRE=False
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    restart: unless-stopped

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: finexa_celery_worker
    command: celery -A core worker -l INFO
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgres://finexa_user:finexa_password@db:5432/finexa
      - DB_SSL_REQUIRE=False
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
      - db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    container_name: finexa_frontend
    volumes:
      - ./frontend:/app/frontend
      - ./packages:/app/packages
      - ./package.json:/app/package.json
      - /app/node_modules
      - /app/frontend/node_modules
      - /app/packages/api/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
